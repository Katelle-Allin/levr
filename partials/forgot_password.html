<div class="auth-container">
    <div class="page-header">
        <h2>Mot de passe oublié</h2>
        <p>Entrez votre email pour recevoir un lien de réinitialisation</p>
    </div>

    <!-- Messages d'erreur et de succès -->
    <div ng-if="error" class="alert alert-error">
        {{ error }}
    </div>
    <div ng-if="success" class="alert alert-success">
        {{ success }}
    </div>

    <!-- Formulaire (masqué après succès) -->
    <form ng-submit="sendResetEmail()" name="forgotForm" ng-if="!success">
        <div class="form-group">
            <label for="forgot-email">Email</label>
            <input
                type="email"
                id="forgot-email"
                class="form-control"
                ng-model="forgotData.email"
                placeholder="vous@exemple.com"
                required>
        </div>

        <button
            type="submit"
            class="btn btn-primary btn-block"
            ng-disabled="loading || forgotForm.$invalid">
            <span ng-if="!loading">Envoyer le lien</span>
            <span ng-if="loading">Envoi en cours...</span>
        </button>
    </form>

    <div class="auth-toggle">
        <p>
            <a href="#!/login" class="btn-link">← Retour à la connexion</a>
        </p>
    </div>
</div>
