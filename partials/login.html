<div class="auth-container">
    <div class="page-header">
        <h2>Connexion</h2>
        <p>Bon retour parmi nous !</p>
    </div>

    <!-- Messages d'erreur et de succès -->
    <div ng-if="error" class="alert alert-error">
        {{ error }}
    </div>
    <div ng-if="success" class="alert alert-success">
        {{ success }}
    </div>

    <!-- Boutons OAuth -->
    <div class="oauth-section">
        <button class="btn-oauth" ng-click="loginWithOAuth('google')" ng-disabled="loading">
            <svg class="btn-oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuer avec Google
        </button>
    </div>

    <!-- Séparateur -->
    <div class="oauth-divider"><span>ou</span></div>

    <!-- Formulaire de connexion -->
    <form ng-submit="login()" name="loginForm">
        <div class="form-group">
            <label for="login-email">Email</label>
            <input
                type="email"
                id="login-email"
                class="form-control"
                ng-model="loginData.email"
                placeholder="vous@exemple.com"
                required>
        </div>

        <div class="form-group">
            <label for="login-password">Mot de passe</label>
            <input
                type="password"
                id="login-password"
                class="form-control"
                ng-model="loginData.password"
                placeholder="Votre mot de passe"
                required>
            <div class="forgot-link">
                <a href="#!/forgot-password" class="btn-link">Mot de passe oublié ?</a>
            </div>
        </div>

        <button
            type="submit"
            class="btn btn-primary btn-block"
            ng-disabled="loading || loginForm.$invalid">
            <span ng-if="!loading">Se connecter</span>
            <span ng-if="loading">Connexion...</span>
        </button>
    </form>

    <!-- Lien vers l'inscription -->
    <div class="auth-toggle">
        <p>
            Pas encore de compte ?
            <a href="#!/signup" class="btn-link">S'inscrire</a>
        </p>
    </div>
</div>
