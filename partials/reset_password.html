<div class="auth-container">
    <div class="page-header">
        <h2>Nouveau mot de passe</h2>
        <p>Choisissez un nouveau mot de passe pour votre compte</p>
    </div>

    <!-- Messages d'erreur et de succès -->
    <div ng-if="error" class="alert alert-error">
        {{ error }}
    </div>
    <div ng-if="success" class="alert alert-success">
        {{ success }}
    </div>

    <!-- Formulaire (masqué après succès) -->
    <form ng-submit="doResetPassword()" name="resetForm" ng-if="!success">
        <div class="form-group">
            <label for="reset-password">Nouveau mot de passe</label>
            <input
                type="password"
                id="reset-password"
                class="form-control"
                ng-model="resetData.password"
                placeholder="Au moins 6 caractères"
                required>
        </div>

        <div class="form-group">
            <label for="reset-confirm">Confirmer le mot de passe</label>
            <input
                type="password"
                id="reset-confirm"
                class="form-control"
                ng-model="resetData.confirm"
                placeholder="Répétez le mot de passe"
                required>
            <p class="field-error"
               ng-if="resetData.confirm && resetData.password !== resetData.confirm">
                Les mots de passe ne correspondent pas.
            </p>
        </div>

        <button
            type="submit"
            class="btn btn-primary btn-block"
            ng-disabled="loading || resetForm.$invalid || (resetData.confirm && resetData.password !== resetData.confirm)">
            <span ng-if="!loading">Changer le mot de passe</span>
            <span ng-if="loading">Enregistrement...</span>
        </button>
    </form>
</div>
